name: itinventory_equip_devops

services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile
    image: itinventory_equip_devops_mysql
    container_name: itinventory_equip_devops_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: itinventory_equip
      MYSQL_USER: itinv
      MYSQL_PASSWORD: itinv123
    volumes:
      - itinventory_equip_devops_mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - itinventory_equip_devops_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: itinventory_equip_devops_app
    container_name: itinventory_equip_devops_app
    ports:
      - "8082:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - itinventory_equip_devops_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: itinventory_equip_devops_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - itinventory_equip_devops_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: itinventory_equip_devops_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - itinventory_equip_devops_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -fs http://localhost:5601/api/status >/dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    image: itinventory_equip_devops_etl
    container_name: itinventory_equip_devops_etl
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_DB: itinventory_equip
      MYSQL_USER: itinv
      MYSQL_PASSWORD: itinv123
      ELASTIC_HOST: http://elasticsearch:9200
      ELASTIC_INDEX: itinventory-equipments
    networks:
      - itinventory_equip_devops_net
    restart: "no"

networks:
  itinventory_equip_devops_net:
    driver: bridge

volumes:
  itinventory_equip_devops_mysql_data: