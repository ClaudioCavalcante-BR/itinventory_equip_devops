apiVersion: apps/v1
kind: Deployment
metadata:
  name: itinventory-backend
  namespace: itinventory-devops
  labels:
    app.kubernetes.io/name: itinventory-backend
    app.kubernetes.io/part-of: itinventory
    app.kubernetes.io/version: "2026-01-14-01"
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: itinventory-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: itinventory-backend
        app.kubernetes.io/part-of: itinventory
        app.kubernetes.io/version: "2026-01-14-01"
    spec:
      containers:
        - name: backend
          image: ccaalmeida/itinventory-backend-devops:2026-04-02-02
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20