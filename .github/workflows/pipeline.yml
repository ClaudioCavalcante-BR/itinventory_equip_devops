name: CI/CD - Build and Publish ITInventory Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_publish_container:
    name: Build, Package and Publish Docker Image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ccaalmeida/itinventory-backend-devops
      IMAGE_TAG: 2026-04-04-${{ github.run_number }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execution permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build application with Maven
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest